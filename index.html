        * {

body {
    background: #f0f2f8;
    min-height: 100vh;
    overflow-x: hidden;
    margin: 0;
    padding: 0;
}

        
        .global-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s ease, opacity 0.2s ease;
        }
        
        .global-loader.active {
            visibility: visible;
            opacity: 1;
        }
        
        .loader-circle {
            width: 70px;
            height: 70px;
            border: 6px solid rgba(255, 255, 255, 0.2);
            border-top: 6px solid #ffffff;
            border-right: 6px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
.main-header {

}

}

.main-header h1 i {

}

.main-header p {

}
        
        .login-page {

        }

tr:first-child td:not(.type-header) {

.shift-cell {

    transition: all 0.15s ease;
}

.popup-box {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 32px 35px;
    border-radius: 48px;
    z-index: 2200;
    width: calc(100% - 1cm);
    max-width: 500px;
    text-align: center;
    display: none;
    box-shadow: 0 30px 55px rgba(0, 0, 0, 0.3);
    animation: popupBounce 0.3s ease-out;
}
        
        @keyframes popupBounce {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            80% {
                transform: translate(-50%, -50%) scale(1.05);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        .popup-box h3 {
            margin-bottom: 15px;
            font-size: 26px;
            font-weight: 800;
        }
        
        .popup-box p {
            margin-bottom: 25px;
            color: #4a5568;
            font-size: 16px;
        }
        
        .popup-box button {
            background: linear-gradient(135deg, #1f6e8c, #0e4e6b);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }
        
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2100;
            display: none;
        }

    if (saved) {
        const data = JSON.parse(saved);
        console.log('Saved months:', Object.keys(data));
        return data;
    }
    return null;

function saveData() {
    showLoader(true);
    // Save to Firebase under user-specific path
    const userRef = database.ref(`users/${USERNAME}/monthlyData`);
    userRef.set(monthlyData)
        .then(() => {
            setTimeout(() => showLoader(false), 300);
        })
        .catch((error) => {
            console.error("Save error:", error);
            showLoader(false);
            showPopup("მონაცემების შენახვა ვერ მოხერხდა!", "error");
        });
}
    
    function refreshData() {
    showLoader(true);
    
    loadData();
    
    renderCurrentMonth();
    
    showPopup("მონაცემები განახლდა!", "success");
    
    setTimeout(() => showLoader(false), 500);
}

    
function loadData() {
    showLoader(true);
    const userRef = database.ref(`users/${USERNAME}/monthlyData`);
    userRef.once('value')
        .then((snapshot) => {
            const data = snapshot.val();
            if (data) {
                monthlyData = data;
                console.log('Data loaded from Firebase:', Object.keys(monthlyData).length, 'months');
            } else {
                console.log('No saved data found in Firebase');
                monthlyData = {};
            }
            showLoader(false);
            renderCurrentMonth();
        })
        .catch((error) => {
            console.error("Load error:", error);
            showLoader(false);
            monthlyData = {};
            renderCurrentMonth();
            showPopup("მონაცემების ჩატვირთვა ვერ მოხერხდა!", "error");
        });
}
    
function getDutyRate(year, month) {
    if (year > 2025 || (year === 2025 && month >= 4)) {
        return 5.84;
    }
    return 5;
}

function getObsRate(year, month) {
    if (year > 2025 || (year === 2025 && month >= 1)) {
        return 7;
    }
    return 5;
}

function calculateAndDisplayTotal() {
    const key = getMonthKey(currentDisplayYear, currentDisplayMonth);
    const data = monthlyData[key];
    
    if (!data) {
        document.getElementById('totalEarning').textContent = '0.00 ₾';
        return;
    }
    
    let total = 0;
    
    const dutyRate = getDutyRate(currentDisplayYear, currentDisplayMonth);
    const obsRate = getObsRate(currentDisplayYear, currentDisplayMonth);
    
    if (data.shifts) {
        Object.values(data.shifts).forEach(shift => {
            total += (shift.duty * dutyRate);
            total += (shift.obs * obsRate);
            total += (shift.trans * TRANS_RATE);
            total += (shift.station * STATION_RATE);
        });
    }
    
    if (data.extras) {
        Object.values(data.extras).forEach(extra => {
            total += (extra.obs * obsRate);
            total += (extra.trans * TRANS_RATE);
            total += (extra.station * STATION_RATE);
        });
    }
    
    if (data.insurance) total -= INSURANCE_DEDUCTION;
    if (data.fitpass) total -= FITPASS_DEDUCTION;
    
    document.getElementById('totalEarning').textContent = total.toFixed(2) + ' ₾';
}

    };
    
    const titles = {
        success: "წარმატება",
        error: "შეცდომა",
        info: "ინფორმაცია"
    };
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    
    toast.innerHTML = `
        <div class="toast-icon">
            ${icons[type]}
        </div>
        <div class="toast-content">
            <div class="toast-title">${titles[type]}</div>
            <div class="toast-message">${message}</div>
        </div>
        <button class="toast-close">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z" fill="#a0aec0"/>
            </svg>
        </button>
        <div class="toast-progress"></div>
    `;
    
    container.appendChild(toast);
    
    const timeout = setTimeout(() => {
        removeToast(toast);
    }, 3000);
    
    const closeBtn = toast.querySelector('.toast-close');
    closeBtn.addEventListener('click', () => {
        clearTimeout(timeout);
        removeToast(toast);
    });
    
    toast.addEventListener('mouseenter', () => {
        clearTimeout(timeout);
        const progress = toast.querySelector('.toast-progress');
        if (progress) {
            progress.style.animationPlayState = 'paused';
        }
    });
    
    toast.addEventListener('mouseleave', () => {
        const newTimeout = setTimeout(() => {
            removeToast(toast);
        }, 3000);
        toast._timeout = newTimeout;
        const progress = toast.querySelector('.toast-progress');
        if (progress) {
            progress.style.animationPlayState = 'running';
        }
    });
}

function removeToast(toast) {
    toast.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => {
        toast.remove();
    }, 300);
}

function updateShiftValue(day, field, value) {
    const key = getMonthKey(currentDisplayYear, currentDisplayMonth);
    
    if (!monthlyData[key]) {
        monthlyData[key] = { shifts: {}, insurance: false, fitpass: false, actualAmount: 0 };
    }
    
    let numValue = parseFloat(value);
    if (isNaN(numValue)) numValue = 0;
    
    if (field === 'duty') {
        if (!monthlyData[key].shifts[day]) {
            monthlyData[key].shifts[day] = { duty: 0, obs: 0, trans: 0, station: 0 };
        }
        monthlyData[key].shifts[day][field] = numValue;
    } 
    else {
        if (monthlyData[key].shifts[day]) {
            monthlyData[key].shifts[day][field] = numValue;
        } else {
            if (!monthlyData[key].extras) {
                monthlyData[key].extras = {};
            }
            if (!monthlyData[key].extras[day]) {
                monthlyData[key].extras[day] = { obs: 0, trans: 0, station: 0 };
            }
            monthlyData[key].extras[day][field] = numValue;
        }
    }
    
    saveData();
    renderCurrentMonth();
}
    
function handleShiftCellClick(year, month, day, currentValue) {
    const key = getMonthKey(year, month);
    const hasExistingValue = currentValue > 0;
    
    if (!hasExistingValue) {
        showShiftTypePopup(year, month, day);
    } else {
        showConfirmChangePopup(year, month, day, currentValue);
    }
}

        return;

    const { year, month } = nextMonthTarget;
    const key = getMonthKey(year, month);
    
    if (!monthlyData[key]) {
        monthlyData[key] = { shifts: {}, insurance: false, fitpass: false, actualAmount: 0 };

    monthlyData[key].insurance = document.getElementById('shiftInsurance').checked;
    monthlyData[key].fitpass = document.getElementById('fitpassCheckbox').checked;
    
    const existingShifts = monthlyData[key].shifts || {};

if (data.extras) {
    Object.values(data.extras).forEach(extra => {
        expected += (extra.obs * obsRate);
        expected += (extra.trans * TRANS_RATE);
        expected += (extra.station * STATION_RATE);
    });
}
        
        if (data.insurance) expected -= INSURANCE_DEDUCTION;
        if (data.fitpass) expected -= FITPASS_DEDUCTION;
        allExpected.push(expected);
        
        if (data.actualAmount && data.actualAmount > 0) {
            totalEarnedAll += data.actualAmount;
            if (data.actualAmount > maxActual) maxActual = data.actualAmount;
            if (data.actualAmount < minActual) minActual = data.actualAmount;
        }
    });
    
    if (minActual === Infinity) minActual = 0;
    
    let filteredExpected = allExpected.filter(val => val > 0);
    let maxExpected = filteredExpected.length > 0 ? Math.max(...filteredExpected) : 0;
    let minExpected = filteredExpected.length > 0 ? Math.min(...filteredExpected) : 0;

    `;
    
    monthsContainer.innerHTML = '';
    
    const sortedKeys = Object.keys(monthlyData).sort().reverse();
    
    if (sortedKeys.length === 0) {
        monthsContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #888;">მონაცემები არ არის</div>';
        document.getElementById('otherMonthsModal').style.display = 'flex';
        return;
    }
    
    sortedKeys.forEach(key => {
        const [year, month] = key.split('-').map(Number);
        const data = monthlyData[key];
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const monthName = `${georgianMonths[month]} ${year}`;
        
        let totalDuty = 0;
        let totalObs = 0;
        let totalTrans = 0;
        let totalStation = 0;
        
        if (data.shifts) {
            Object.values(data.shifts).forEach(shift => {
                totalDuty += (shift.duty || 0);
                totalObs += (shift.obs || 0);
                totalTrans += (shift.trans || 0);
                totalStation += (shift.station || 0);
            });
        }
        
        if (data.extras) {
            Object.values(data.extras).forEach(extra => {
                totalObs += (extra.obs || 0);
                totalTrans += (extra.trans || 0);
                totalStation += (extra.station || 0);
            });
        }
        
const dutyRate = getDutyRate(year, month);
const obsRate = getObsRate(year, month);

let expected = (totalDuty * dutyRate) + (totalObs * obsRate) + (totalTrans * TRANS_RATE) + (totalStation * STATION_RATE);
if (data.insurance) expected -= INSURANCE_DEDUCTION;
        if (data.fitpass) expected -= FITPASS_DEDUCTION;
        
        const actualAmount = data.actualAmount || 0;
        
        let tableHtml = `

                    <span>${monthName}</span>
                    <button onclick="deleteMonth('${key}', '${monthName}')" style="background: rgba(231, 76, 60, 0.8); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.background='#e74c3c'" onmouseout="this.style.background='rgba(231, 76, 60, 0.8)'">

                        <thead>

        for (let day = 1; day <= daysInMonth; day++) {
            tableHtml += `<th style="background: #2c3e50; color: white; padding: 8px; text-align: center; min-width: 50px;">${day}</th>`;
        }
        
        tableHtml += `<th style="background: #2c3e50; color: white; padding: 10px; text-align: center; min-width: 80px;">ჯამი</th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        
tableHtml += `<tr>

for (let day = 1; day <= daysInMonth; day++) {
    const shiftVal = (data.shifts && data.shifts[day] && data.shifts[day].duty) || 0;
    const cellStyle = shiftVal > 0 ? 'background-color: #2b7a4b; color: white; font-weight: bold; text-align: center; padding: 8px;' : 'text-align: center; padding: 8px;';
tableHtml += `<td style="${cellStyle}">${shiftVal > 0 ? shiftVal : ''}</td>`;
  
}
tableHtml += `<td style="text-align: center; font-weight: bold; background: #e9f0f5; padding: 8px;">${totalDuty} სთ</td>
             </tr>`;
        
        tableHtml += `<tr>
            <td style="background: #e9f0f5; font-weight: 800; padding: 10px; position: sticky; left: 0;">ობსერვაცია</td>`;
        for (let day = 1; day <= daysInMonth; day++) {
            let obsVal = 0;
            if (data.shifts && data.shifts[day]) obsVal += (data.shifts[day].obs || 0);
            if (data.extras && data.extras[day]) obsVal += (data.extras[day].obs || 0);
tableHtml += `<td style="text-align: center; padding: 8px;">${obsVal > 0 ? obsVal : ''}</td>`;
}
        tableHtml += `<td style="text-align: center; font-weight: bold; background: #e9f0f5; padding: 8px;">${totalObs}</td>
        </tr>`;
        
        tableHtml += `<tr>
            <td style="background: #e9f0f5; font-weight: 800; padding: 10px; position: sticky; left: 0;">ჰემოტრანსფუზია</td>`;
        for (let day = 1; day <= daysInMonth; day++) {
            let transVal = 0;
            if (data.shifts && data.shifts[day]) transVal += (data.shifts[day].trans || 0);
            if (data.extras && data.extras[day]) transVal += (data.extras[day].trans || 0);
tableHtml += `<td style="text-align: center; padding: 8px;">${transVal > 0 ? transVal : ''}</td>`;
}
        tableHtml += `<td style="text-align: center; font-weight: bold; background: #e9f0f5; padding: 8px;">${totalTrans}</td>
        </tr>`;
        
        tableHtml += `<tr>

        for (let day = 1; day <= daysInMonth; day++) {
            let stationVal = 0;
            if (data.shifts && data.shifts[day]) stationVal += (data.shifts[day].station || 0);
            if (data.extras && data.extras[day]) stationVal += (data.extras[day].station || 0);
tableHtml += `<td style="text-align: center; padding: 8px;">${stationVal > 0 ? stationVal : ''}</td>`;
}
        tableHtml += `<td style="text-align: center; font-weight: bold; background: #e9f0f5; padding: 8px;">${totalStation}</td>
        </tr>`;
        
        tableHtml += `
                        </tbody>
                    </table>
                </div>
<div style="padding: 20px 20px 15px 20px; border-top: 1px solid #e2edf2; text-align: right;">
    <div style="font-size: 16px; display: flex; align-items: center; justify-content: flex-end; gap: 20px; flex-wrap: wrap;">
        <div>
            <span style="font-weight: 600;">მოსალოდნელი:</span>
            <span style="color: #e74c3c; font-weight: 800; font-size: 18px; margin-left: 8px;">${expected.toFixed(2)} ₾</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span style="font-weight: 600;">ჩარიცხული:</span>

                if (difference > 0) {
                    return `<span style="color: #27ae60; font-weight: 800; font-size: 18px;">+${absDifference} ₾</span>`;
                } else if (difference < 0) {
                    return `<span style="color: #e74c3c; font-weight: 800; font-size: 18px;">-${absDifference} ₾</span>`;

</div>

        monthsContainer.innerHTML += tableHtml;

    document.getElementById('otherMonthsModal').style.display = 'flex';
}
    
    function promptActualAmount(monthKey, currentAmount) {
    let overlay = document.getElementById('actualAmountOverlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'actualAmountOverlay';
        overlay.style.position = 'fixed';
        overlay.style.top = '0';
        overlay.style.left = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.backgroundColor = 'rgba(0,0,0,0.7)';
        overlay.style.backdropFilter = 'blur(5px)';
        overlay.style.zIndex = '3000';
        overlay.style.display = 'flex';
        overlay.style.alignItems = 'center';
        overlay.style.justifyContent = 'center';
        document.body.appendChild(overlay);
    }
    
    overlay.innerHTML = `
        <div style="background: white; border-radius: 40px; padding: 35px; width: 90%; max-width: 400px; text-align: center; animation: modalSlideIn 0.3s ease-out;">
            <h3 style="margin-bottom: 20px; font-size: 24px; color: #1f6e8c;">თანხის შეცვლა</h3>
            <p style="margin-bottom: 15px; color: #4a5568;">მიმდინარე მნიშვნელობა: <strong>${currentAmount.toFixed(2)} ₾</strong></p>
            <input type="number" id="newActualAmount" step="0.01" min="0" value="${currentAmount}" 
                   style="width: 80%; padding: 14px; border-radius: 50px; border: 2px solid #e2e8f0; font-size: 18px; text-align: center; margin-bottom: 20px;" 
                   placeholder="თანხა ₾">
            <div>
                <button id="saveActualAmount" style="background: linear-gradient(135deg, #27ae60, #1e8449); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 700; margin: 5px; cursor: pointer;">შენახვა</button>
                <button id="cancelActualAmount" style="background: #e74c3c; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 700; margin: 5px; cursor: pointer;">გაუქმება</button>
            </div>
        </div>
    `;
    
    overlay.style.display = 'flex';
    
    document.getElementById('saveActualAmount').onclick = () => {
        const newAmount = parseFloat(document.getElementById('newActualAmount').value);
        if (!isNaN(newAmount) && newAmount >= 0) {
            updateActualAmount(monthKey, newAmount);
            overlay.style.display = 'none';
            showPopup("ჩარიცხული თანხა განახლდა!", "success");
        } else {
            showPopup("გთხოვთ შეიყვანოთ სწორი თანხა", "error");
        }
    };
    
    document.getElementById('cancelActualAmount').onclick = () => {
        overlay.style.display = 'none';
    };
}

function updateActualAmount(monthKey, amount) {
    if (monthlyData[monthKey]) {
        monthlyData[monthKey].actualAmount = parseFloat(amount) || 0;
        saveData();
        showOtherMonthsModal();
    }
}
    
    function deleteMonth(monthKey, monthName) {
    let overlay = document.getElementById('deleteMonthOverlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'deleteMonthOverlay';
        overlay.style.position = 'fixed';
        overlay.style.top = '0';
        overlay.style.left = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.backgroundColor = 'rgba(0,0,0,0.7)';
        overlay.style.backdropFilter = 'blur(5px)';
        overlay.style.zIndex = '3000';
        overlay.style.display = 'flex';
        overlay.style.alignItems = 'center';
        overlay.style.justifyContent = 'center';
        document.body.appendChild(overlay);
    }
    
    overlay.innerHTML = `
        <div style="background: white; border-radius: 40px; padding: 35px; width: 90%; max-width: 400px; text-align: center; animation: modalSlideIn 0.3s ease-out;">
            <i class="fas fa-exclamation-triangle" style="font-size: 50px; color: #e74c3c; margin-bottom: 15px;"></i>
            <h3 style="margin-bottom: 15px; color: #2d3748;">წაშლა</h3>
            <p style="margin-bottom: 25px; color: #718096;">ნამდვილად გსურთ წაშალოთ <strong>${monthName}</strong>?<br>ყველა მონაცემი სამუდამოდ წაიშლება!</p>
            <div>
                <button id="confirmDelete" style="background: #e74c3c; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 700; margin: 5px; cursor: pointer;">წაშლა</button>
                <button id="cancelDelete" style="background: #95a5a6; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 700; margin: 5px; cursor: pointer;">გაუქმება</button>
            </div>
        </div>
    `;
    
    overlay.style.display = 'flex';
    
    document.getElementById('confirmDelete').onclick = () => {
        if (monthlyData[monthKey]) {
            delete monthlyData[monthKey];
            saveData();
            overlay.style.display = 'none';
            showPopup(`${monthName} წაიშალა!`, "success");
            showOtherMonthsModal();
            
            const currentKey = getMonthKey(currentDisplayYear, currentDisplayMonth);
            if (currentKey === monthKey) {
                const remainingMonths = Object.keys(monthlyData).sort();
                if (remainingMonths.length > 0) {
                    const [lastYear, lastMonth] = remainingMonths[remainingMonths.length - 1].split('-').map(Number);
                    currentDisplayYear = lastYear;
                    currentDisplayMonth = lastMonth;
                    renderCurrentMonth();
                } else {
                    renderCurrentMonth();
                }
            }
        }
    };
    
    document.getElementById('cancelDelete').onclick = () => {
        overlay.style.display = 'none';
    };
}

function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    if (username === USERNAME && password === PASSWORD) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        
        loadData();
        
        const today = new Date();
        currentDisplayYear = today.getFullYear();
        currentDisplayMonth = today.getMonth();
        
        document.getElementById('currentMonthLabel').textContent = `${georgianMonths[currentDisplayMonth]} ${currentDisplayYear}`;
        
        localStorage.setItem('isLoggedIn', 'true');
    } else {
        showPopup("მომხმარებლის სახელი ან პაროლი არასწორია!", "error");
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        
        const loginContainer = document.querySelector('.login-container');
        loginContainer.classList.add('error-animation');
        setTimeout(() => loginContainer.classList.remove('error-animation'), 500);
    }
}
    
function logout() {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    localStorage.removeItem('isLoggedIn');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    monthlyData = {};
}
    
    function addEnterKeySupport() {
        const passwordField = document.getElementById('password');
        if (passwordField) {
            passwordField.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    login();
                }
            });
        }
        
        const usernameField = document.getElementById('username');
        if (usernameField) {
            usernameField.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    if (passwordField) passwordField.focus();
                }
            });
        }
    }
    
function checkAutoLogin() {
    const savedLogin = localStorage.getItem('isLoggedIn');
    if (savedLogin === 'true') {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        loadData();
        
        const today = new Date();
        currentDisplayYear = today.getFullYear();
        currentDisplayMonth = today.getMonth();
        
        document.getElementById('currentMonthLabel').textContent = `${georgianMonths[currentDisplayMonth]} ${currentDisplayYear}`;
        
    }
}
    
window.onload = function() {
    addEnterKeySupport();
    checkAutoLogin();
    
    const today = new Date();

    
    const prevBtn = document.getElementById('prevMonthBtn');
    const nextBtn = document.getElementById('nextMonthBtn');
    
    if (prevBtn) {
        prevBtn.onclick = goPrevMonth;
    } else {
        console.error('prevMonthBtn not found');
    }
    
    if (nextBtn) {
        nextBtn.onclick = goNextMonth;
    } else {
        console.error('nextMonthBtn not found');
    }
};
